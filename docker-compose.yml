services:
  backend:
    build: .
    container_name: conduit_backend
    ports:
      - "8000:8000"   # API
      - "8080:8080"   # HTTP proxy
      - "1080:1080"   # SOCKS5 proxy
    volumes:
      - conduit_data:/data
      - ./backend:/app/backend   # Mount backend code for development
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - DATABASE_PATH=/data/conduit.db
      - SINGBOX_CONFIG_PATH=/data/singbox_config.json
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: conduit_frontend
    ports:
      - "80:80"       # Web UI
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  conduit_data: {}
