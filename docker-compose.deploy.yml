# Conduit — deploy with pre-built images (no build on your machine).
# Images: ghcr.io/sajjadsaharkhan/conduit/backend:main, ghcr.io/sajjadsaharkhan/conduit/frontend:main
#
# Usage:
#   docker compose -f docker-compose.deploy.yml up -d
#
# First run: pull images if needed:
#   docker pull ghcr.io/sajjadsaharkhan/conduit/backend:main
#   docker pull ghcr.io/sajjadsaharkhan/conduit/frontend:main

services:
  backend:
    image: ghcr.io/sajjadsaharkhan/conduit/backend:main
    container_name: conduit_backend
    ports:
      - "8000:8000"   # API
      - "8080:8080"   # HTTP proxy
      - "1080:1080"   # SOCKS5 proxy
    volumes:
      - conduit_data:/data
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - DATABASE_PATH=/data/conduit.db
      - SINGBOX_CONFIG_PATH=/data/singbox_config.json
    restart: unless-stopped

  frontend:
    image: ghcr.io/sajjadsaharkhan/conduit/frontend:main
    container_name: conduit_frontend
    ports:
      - "80:80"       # Web UI
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  conduit_data: {}
